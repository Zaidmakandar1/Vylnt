<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevGuard</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      background: #fff;
      color: #1a1a1a;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #0f172a;
      color: #fff;
      padding: 12px;
      font-weight: 600;
      border-bottom: 1px solid #e5e5e5;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .findings-list {
      list-style: none;
    }

    .findings-list li {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 6px;
      background: #f9fafb;
      border-left: 3px solid #d1d5db;
    }

    .finding-severity {
      font-weight: 600;
      font-size: 11px;
      margin-bottom: 3px;
    }

    .critical { color: #dc2626; border-left-color: #dc2626; }
    .high { color: #ea580c; border-left-color: #ea580c; }
    .medium { color: #f59e0b; border-left-color: #f59e0b; }
    .low { color: #6b7280; border-left-color: #6b7280; }
    .informational { color: #3b82f6; border-left-color: #3b82f6; }

    .finding-type {
      font-size: 12px;
      color: #374151;
      margin-bottom: 3px;
    }

    .finding-resource {
      font-size: 11px;
      color: #6b7280;
      word-break: break-all;
      line-height: 1.3;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #9ca3af;
      font-size: 12px;
    }

    .summary {
      padding: 8px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #e5e5e5;
      font-weight: 600;
      font-size: 12px;
      color: #374151;
    }

    .toggle-section {
      padding: 12px;
      border-top: 1px solid #e5e5e5;
      background: #f9fafb;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-label input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      background: #d1d5db;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .toggle-slider::after {
      content: "";
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-label input:checked + .toggle-slider {
      background: #2563eb;
    }

    .toggle-label input:checked + .toggle-slider::after {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <header>DevGuard Findings</header>
  <div class="summary" id="summary">Findings: 0</div>
  <div class="content">
    <ul id="findings-list" class="findings-list"></ul>
  </div>
  <div class="toggle-section">
    <label class="toggle-label" for="scanning-toggle">
      <input type="checkbox" id="scanning-toggle" checked />
      <span class="toggle-slider"></span>
      <span id="toggle-text">Scanning: On</span>
    </label>
  </div>

  <script type="module" src="../../dist/side-panel.js"></script>
</body>
</html>
